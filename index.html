<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TodoApp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="header-title">TodoApp</h1>
    <button class="btn btn-primary" id="btn-add-task">+ Add Task</button>
  </header>

  <main class="main">
    <!-- Progress Section -->
    <section class="progress-section">
      <div class="progress-overall">
        <div class="progress-label">
          <span>Overall Progress</span>
          <span id="progress-overall-text">0 / 0 (0%)</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-overall-bar" style="width: 0%"></div>
        </div>
      </div>

      <div class="progress-categories">
        <div class="progress-category">
          <div class="progress-label">
            <span class="category-badge category-work">Work</span>
            <span id="progress-work-text">0 / 0</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill fill-work" id="progress-work-bar" style="width: 0%"></div>
          </div>
        </div>

        <div class="progress-category">
          <div class="progress-label">
            <span class="category-badge category-personal">Personal</span>
            <span id="progress-personal-text">0 / 0</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill fill-personal" id="progress-personal-bar" style="width: 0%"></div>
          </div>
        </div>

        <div class="progress-category">
          <div class="progress-label">
            <span class="category-badge category-study">Study</span>
            <span id="progress-study-text">0 / 0</span>
          </div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill fill-study" id="progress-study-bar" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="work">Work</button>
      <button class="filter-btn" data-filter="personal">Personal</button>
      <button class="filter-btn" data-filter="study">Study</button>
    </div>

    <!-- Task List -->
    <ul class="task-list" id="task-list"></ul>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" id="modal">
      <h2 class="modal-title" id="modal-title">Add Task</h2>
      <form id="task-form" novalidate>
        <div class="form-group">
          <label for="input-title">Title <span class="required">*</span></label>
          <input type="text" id="input-title" class="form-control" placeholder="Enter task title" />
          <span class="error-message" id="error-title"></span>
        </div>
        <div class="form-group">
          <label for="input-description">Description</label>
          <textarea id="input-description" class="form-control" placeholder="Enter description (optional)" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="input-category">Category</label>
          <select id="input-category" class="form-control">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="study">Study</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
