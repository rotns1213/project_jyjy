<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>키캡 맞추기 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>⌨️ 위치 맞춰라~ </h1>
        
        <div class="difficulty-selection">
            <button onclick="startGame(1)">1단계 (부분)</button>
            <button onclick="startGame(2)">2단계 (한 줄)</button>
            <button onclick="startGame(3)">3단계 (전체)</button>
            <div id="lv1-config" style="margin-top:10px;">
                구멍 개수: <input type="number" id="hole-count" value="5" min="1" max="26">
            </div>
        </div>

        <div id="status-message" class="message-box">난이도를 선택해 주세요!</div>
        
        <div id="keyboard-plate" class="keyboard"></div>
        <div id="keycap-storage" class="storage"></div>

        <button class="reset-btn" onclick="location.reload()">초기화</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
